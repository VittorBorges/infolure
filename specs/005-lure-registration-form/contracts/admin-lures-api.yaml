openapi: 3.1.0
info:
  title: Infolure Admin API — Iscas (Feature 005)
  version: "005"
  description: >
    Extensão do contrato admin (feature 002) para registo/edição completos de iscas, incluindo lista
    de tamanhos (rótulo+mm+g), cores com lista aberta de códigos hex e foto opcional por cor, e
    upload de média. JSON em snake_case. Todos os endpoints exigem a policy de admin (JWT Supabase,
    role=admin). Erros seguem ProblemDetails (RFC 7807).
servers:
  - url: /v1/admin

paths:
  /lures:
    post:
      summary: Criar isca completa (US1)
      operationId: createLure
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/LureWriteRequest" }
      responses:
        "201":
          description: Criada
          content:
            application/json:
              schema:
                type: object
                properties:
                  id: { type: string, format: uuid }
        "422":
          description: Falha de validação (campo obrigatório, hex inválido, etc.)
          content:
            application/problem+json:
              schema: { $ref: "#/components/schemas/ValidationProblem" }
        "409":
          description: Slug já existente
          content:
            application/problem+json:
              schema: { $ref: "#/components/schemas/Problem" }

  /lures/{id}:
    get:
      summary: Obter isca completa para edição (US2)
      operationId: getLureForEdit
      parameters:
        - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        "200":
          description: Isca com todas as propriedades, tamanhos, cores e hex
          content:
            application/json:
              schema: { $ref: "#/components/schemas/LureDetail" }
        "404": { description: Não encontrada }
    put:
      summary: Atualizar isca completa (US2) — substitui coleções aninhadas pelo payload
      operationId: updateLure
      parameters:
        - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/LureWriteRequest" }
      responses:
        "204": { description: Atualizada }
        "404": { description: Não encontrada }
        "422":
          description: Falha de validação
          content:
            application/problem+json:
              schema: { $ref: "#/components/schemas/ValidationProblem" }
        "409":
          description: Slug em conflito com outra isca
          content:
            application/problem+json:
              schema: { $ref: "#/components/schemas/Problem" }

  /media:
    post:
      summary: Upload de foto (para foto de cor, US3)
      operationId: uploadMedia
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
            required: [file]
      responses:
        "201":
          description: Ficheiro armazenado; devolve URL pública
          content:
            application/json:
              schema:
                type: object
                properties:
                  url: { type: string, format: uri }
        "415": { description: Tipo de ficheiro não suportado }
        "413": { description: Ficheiro demasiado grande }

components:
  schemas:
    LureWriteRequest:
      type: object
      required: [slug, name, lure_type, sizes]
      properties:
        slug: { type: string }
        name: { type: string, description: "Nome (locale pt)" }
        description: { type: string, nullable: true, description: "Descrição (locale pt)" }
        brand_id: { type: string, format: uuid, nullable: true }
        lure_type: { type: string }
        water_type:
          type: string
          nullable: true
          enum: [freshwater, saltwater, both]
        model_ref: { type: string, nullable: true }
        hook_size: { type: string, nullable: true }
        hook_type: { type: string, nullable: true }
        hook_count: { type: integer, nullable: true }
        material: { type: string, nullable: true }
        depth_min_m: { type: number, nullable: true }
        depth_max_m: { type: number, nullable: true }
        status:
          type: string
          enum: [draft, published, archived]
          default: draft
          description: >
            Em POST, omisso assume 'draft'. Em PUT, omisso PRESERVA o status atual (nunca despromove);
            o formulário pré-preenche e reenvia sempre o status corrente.
        sizes:
          type: array
          minItems: 1
          items: { $ref: "#/components/schemas/SizeInput" }
        colors:
          type: array
          items: { $ref: "#/components/schemas/ColorInput" }
        target_species:
          type: array
          items:
            type: object
            properties:
              species_id: { type: string, format: uuid }
              confidence: { type: string, enum: [primary, secondary], nullable: true }

    SizeInput:
      type: object
      required: [label, weight_g]
      properties:
        code: { type: string, nullable: true, description: "Código curto do tamanho (SKU/ref interna)" }
        label: { type: string, description: "Rótulo do fabricante, ex.: 100SP" }
        length_mm: { type: number, nullable: true, description: "Comprimento (mm)" }
        weight_g: { type: number, description: "Peso (g)" }
        sort_order: { type: integer, default: 0 }

    ColorInput:
      type: object
      description: >
        Variante de cor. Pode ser composta por várias cores de base via a lista hex_codes (cada hex
        opcionalmente rotulado). Foto opcional via photo_url (obtida em /media). Uma cor válida exige
        nome OU pelo menos um hex.
      properties:
        name_pt: { type: string, nullable: true }
        name_en: { type: string, nullable: true }
        pattern: { type: string, nullable: true }
        photo_url: { type: string, format: uri, nullable: true }
        hex_codes:
          type: array
          items: { $ref: "#/components/schemas/HexCodeInput" }

    HexCodeInput:
      type: object
      required: [hex]
      properties:
        hex:
          type: string
          pattern: "^#([0-9a-fA-F]{3}|[0-9a-fA-F]{6})$"
          description: "Código HTML, ex.: #0f0 ou #00ff00"
        label: { type: string, nullable: true, description: "Cor de base, ex.: verde" }
        sort_order: { type: integer, default: 0 }

    LureDetail:
      allOf:
        - $ref: "#/components/schemas/LureWriteRequest"
        - type: object
          properties:
            id: { type: string, format: uuid }
            created_at: { type: string, format: date-time }
            updated_at: { type: string, format: date-time }

    Problem:
      type: object
      properties:
        type: { type: string }
        title: { type: string }
        status: { type: integer }
        detail: { type: string }

    ValidationProblem:
      allOf:
        - $ref: "#/components/schemas/Problem"
        - type: object
          properties:
            errors:
              type: object
              additionalProperties:
                type: array
                items: { type: string }
              description: "Mapa campo → mensagens (ex.: colors[0].hex_codes[1].hex: inválido)"
