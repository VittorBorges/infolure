name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  api:
    name: API (.NET) — build + test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: dev
          POSTGRES_DB: infolure
        ports: ['5433:5432']
        options: >-
          --health-cmd "pg_isready -U postgres" --health-interval 5s
          --health-timeout 5s --health-retries 10
      redis:
        image: redis:7
        ports: ['6379:6379']
      typesense:
        image: typesense/typesense:27.0
        env:
          TYPESENSE_API_KEY: devkey
          TYPESENSE_DATA_DIR: /data
        ports: ['8108:8108']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - name: Apply migrations + seed + index (startup tasks)
        working-directory: apps/api/src/Infolure.Api
        env:
          ASPNETCORE_ENVIRONMENT: Development
          ConnectionStrings__Postgres: Host=localhost;Port=5433;Database=infolure;Username=postgres;Password=dev
        run: |
          dotnet build
          # arranca a API brevemente para correr migrations/seed/index, depois encerra
          (dotnet run --no-build &) ; sleep 25 ; pkill -f Infolure.Api || true
      - name: Test
        working-directory: apps/api
        run: dotnet test

  web:
    name: Web (Next.js) — build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install
        working-directory: apps/web
        run: npm ci
      - name: Build
        working-directory: apps/web
        run: npm run build
